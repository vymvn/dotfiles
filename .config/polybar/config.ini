[colors]
background = #AA1c1c1c
background-alt = #80373B41
foreground = #b0aba2
primary = #b0aba2
secondary = #4d88ff
alert = #bf1d1d
disabled = #0c9fc4

[bar/mybar]
width = 100%
height = 24pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0 
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "Hack;0"
font-1 = "Symbols Nerd Font:size=14;2"

modules-left = xworkspaces
modules-right = pulseaudio wlan vpn eth memory cpu battery date
#modules-center = 

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
#label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
#label = %title:0:60:...%
label = %title%


[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

#format-volume-prefix = "VOL "
#format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = ÔÄ® %percentage%%

label-muted = Ô™Ä 
# label-muted-foreground = ${colors.disabled}

[module/music]
type = custom/script
tail = true
interval = 1
; prefix symbol is shown before the text
format-prefix = "ÔĪė "
#format = <label>
exec = $HOME/.config/polybar/scripts/music.sh


[module/spotify]
type = custom/script
tail = true
interval = 1
; prefix symbol is shown before the text
#format-prefix = "ÔĪė "
format = <label>
exec = ~/.config/polybar/scripts/get_spotify_status.sh

[module/spotify-prev]
type = custom/script
#exec = echo "<previous-song-symbol>"
format = "Ô¶≠" 
click-left = playerctl previous

[module/spotify-play-pause]
type = custom/ipc
hook-0 = echo "Ô££"
hook-1 = echo "ÔĀč"
initial = 1
click-left = playerctl play-pause

[module/spotify-next]
type = custom/script
exec = echo "next-song-symbol"
format = <label>
click-left = playerctl next -p spotify



[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 99
poll-interval = 1
format-charging = <label-charging>
label-charging = ÔĖÉ  %percentage:2%%
format-charging-padding = 1
format-charging-foreground = ${colors.foreground}
format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%
format-discharging-foreground = ${colors.foreground}
format-full-prefix = "Ôēł "
ramp-capacity-0 = "ÔēĻ "
ramp-capacity-1 = "Ôēļ"
ramp-capacity-2 = "ÔēĽ"
ramp-capacity-3 = "ÔēĽ"
ramp-capacity-4 = "ÔēĹ"
ramp-capacity-5 = "Ôēĺ"
ramp-capacity-6 = "ÔēŅ"
ramp-capacity-7 = "ÔĖÄ"
ramp-capacity-8s = "ÔĖĀ"

ramp-capacity-0-foreground = ${colors.red}
animation-charging-framerate = 910
format-discharging-padding = 1


[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
#label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = Ôáę %{F#F0C674}%ifname%%{F-} %essid% %local_ipe

[module/eth]
inherit = network-base
interface-type = wired
label-connected = ÔõŅ %local_ip%

[module/vpn]
type = internal/network
interface = tun0
label-connected = %{F#259e1c}VPN: %local_ip%
format-connected = <label-connected>

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = ÔôŹ %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
